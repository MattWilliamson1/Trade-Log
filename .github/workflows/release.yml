name: Test & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Run on every push and every PR ──────────────────────────────────────────
  test:
    name: Install test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile app.py db.py ib_client.py

      - name: Smoke-test library imports
        run: python -c "import streamlit, pandas, numpy, plotly, yfinance, openpyxl, PIL, ib_insync, nest_asyncio; print('All imports OK')"

      - name: Smoke-test DB init
        run: python -c "from db import init_db; init_db(); print('DB init OK')"

  # ── Build Windows zip (only on push to main, only if tests passed) ──────────
  build-windows:
    name: Build (Windows)
    needs: test
    if: github.event_name == 'push'
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download uv binaries
        shell: pwsh
        run: |
          $uvDir = "dist\Trade Log\_uv"
          New-Item -ItemType Directory -Force $uvDir | Out-Null
          $zipPath = "$env:TEMP\uv.zip"
          Invoke-WebRequest -Uri "https://github.com/astral-sh/uv/releases/latest/download/uv-x86_64-pc-windows-msvc.zip" `
            -OutFile $zipPath -UseBasicParsing
          Expand-Archive -Path $zipPath -DestinationPath $uvDir -Force
          Remove-Item $zipPath
          Write-Host "uv binaries downloaded:"
          Get-ChildItem $uvDir | Select-Object Name, Length

      - name: Build zip
        shell: pwsh
        run: python build_windows_distribution.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: dist/*.zip

  # ── Build Mac tarball (only on push to main, only if tests passed) ──────────
  build-mac:
    name: Build (Mac)
    needs: test
    if: github.event_name == 'push'
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build tarball
        run: python build_mac_distribution.py

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dist
          path: "dist/Trade Log Mac.tar.gz"

  # ── Publish both to one GitHub Release ──────────────────────────────────────
  publish:
    name: Publish release
    needs: [build-windows, build-mac]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (for VERSION)
        uses: actions/checkout@v4

      - name: Read version
        id: ver
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-dist
          path: dist/windows

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-dist
          path: dist/mac

      # The rolling "latest" release accumulates one asset per build because the
      # old dated Windows zips never matched the new name. Clear every existing
      # asset first so the release always shows exactly the current Windows +
      # Mac downloads. (Safe for the in-app updater, which pulls source files —
      # not these zips.)
      - name: Clear old release assets
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view latest --repo "$GITHUB_REPOSITORY" \
            --json assets -q '.assets[].name' 2>/dev/null | while read -r asset; do
            [ -n "$asset" ] && gh release delete-asset latest "$asset" \
              --repo "$GITHUB_REPOSITORY" --yes || true
          done

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Trade Log — Latest (v${{ steps.ver.outputs.version }})"
          body: |
            ## Latest build — v${{ steps.ver.outputs.version }}

            ### Windows
            **Download the zip below**, extract it, and double-click
            `INSTALL - Double-Click This First.bat`.

            ### Mac
            **Download the `.tar.gz` below**, double-click it to extract,
            open the `Trade Log Mac` folder, and double-click `Trade Log.app`.
            If macOS shows a security warning, right-click the app → Open → Open.

            > This release is updated automatically every time an update is pushed.
          files: |
            dist/windows/*.zip
            dist/mac/*.tar.gz
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
