name: Test & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Run on every push and every PR ──────────────────────────────────────────
  test:
    name: Install test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # report all three OSes even if one fails
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile app.py db.py ib_client.py

      - name: Smoke-test library imports
        run: python -c "import streamlit, pandas, numpy, plotly, yfinance, openpyxl, PIL, ib_insync, nest_asyncio; print('All imports OK')"

      - name: Smoke-test DB init
        run: python -c "from db import init_db; init_db(); print('DB init OK')"

  # ── Build and publish only on push to main, only if all tests passed ────────
  build:
    name: Build & Release (Windows)
    needs: test
    if: github.event_name == 'push'
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download uv binaries
        shell: pwsh
        run: |
          $uvDir = "dist\Trade Log\_uv"
          New-Item -ItemType Directory -Force $uvDir | Out-Null
          $zipPath = "$env:TEMP\uv.zip"
          Invoke-WebRequest -Uri "https://github.com/astral-sh/uv/releases/latest/download/uv-x86_64-pc-windows-msvc.zip" `
            -OutFile $zipPath -UseBasicParsing
          Expand-Archive -Path $zipPath -DestinationPath $uvDir -Force
          Remove-Item $zipPath
          Write-Host "uv binaries downloaded:"
          Get-ChildItem $uvDir | Select-Object Name, Length

      - name: Build zip
        shell: pwsh
        run: python build_windows_distribution.py

      - name: Find zip path
        id: zip
        shell: pwsh
        run: |
          $f = Get-ChildItem "dist\*.zip" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          echo "path=$($f.FullName)" >> $env:GITHUB_OUTPUT
          echo "name=$($f.Name)"     >> $env:GITHUB_OUTPUT

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Trade Log — Latest"
          body: |
            ## Latest build

            **Download the zip below**, extract it, and double-click
            `INSTALL - Double-Click This First.bat`.

            > This release is updated automatically every time an update is pushed.
          files: ${{ steps.zip.outputs.path }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
